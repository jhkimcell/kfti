<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>소식 | 재단법인 K-선도국가 미래포럼 (NEXT-K)</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --navy: #1a2db4; --navy-dark: #111b6e; --navy-light: #3a4fd6;
      --gold: #c8a45c; --gold-dark: #b08d42; --bg-soft: #f3f5fb;
      --line: #e3e7ec; --text: #1f2a37; --muted: #66727f; --white: #ffffff;
      --shadow: 0 6px 24px rgba(17, 27, 110, 0.10); --radius: 14px; --maxw: 1180px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: "Pretendard", "Noto Sans KR", -apple-system, "Apple SD Gothic Neo", sans-serif; color: var(--text); background: var(--white); line-height: 1.6; -webkit-font-smoothing: antialiased; }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    ul { list-style: none; }
    .container { width: 100%; max-width: var(--maxw); margin: 0 auto; padding: 0 24px; }
    .section { padding: 84px 0; }
    .section-head { text-align: center; margin-bottom: 48px; }
    .section-head .eyebrow { display: inline-block; color: var(--gold-dark); font-weight: 700; font-size: 0.85rem; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 12px; }
    .section-head h2 { font-size: 2rem; font-weight: 800; color: var(--navy); letter-spacing: -0.02em; }
    .section-head h2::after { content: ""; display: block; width: 48px; height: 3px; background: var(--gold); margin: 18px auto 0; border-radius: 2px; }
    .btn { display: inline-block; padding: 13px 28px; border-radius: 999px; font-weight: 700; font-size: 0.95rem; transition: all 0.2s ease; cursor: pointer; border: none; }
    .btn-gold { background: var(--gold); color: var(--navy-dark); }
    .btn-gold:hover { background: var(--gold-dark); color: var(--white); }
    .btn-ghost { background: transparent; color: var(--white); border: 1.5px solid rgba(255, 255, 255, 0.7); }
    .btn-ghost:hover { background: rgba(255, 255, 255, 0.14); }
    .header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(255, 255, 255, 0.97); border-bottom: 1px solid var(--line); backdrop-filter: saturate(180%) blur(8px); }
    .header-inner { display: flex; align-items: center; justify-content: space-between; height: 76px; }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo .mark { font-size: 1.55rem; font-weight: 900; letter-spacing: -0.02em; color: var(--navy); }
    .logo .mark span { color: var(--gold-dark); }
    .logo .ko { font-size: 0.92rem; font-weight: 600; color: var(--muted); padding-left: 12px; border-left: 1px solid var(--line); }
    .main-nav ul { display: flex; gap: 38px; }
    .main-nav a { font-weight: 600; font-size: 1.02rem; color: var(--text); padding: 8px 2px; position: relative; transition: color 0.2s; }
    .main-nav a::after { content: ""; position: absolute; left: 0; bottom: 0; width: 0; height: 2px; background: var(--gold); transition: width 0.25s ease; }
    .main-nav a:hover { color: var(--navy); }
    .main-nav a:hover::after { width: 100%; }
    .main-nav a.active { color: var(--navy); }
    .main-nav a.active::after { width: 100%; }
    .utils { display: flex; align-items: center; gap: 18px; }
    .icon-btn { background: none; border: none; cursor: pointer; color: var(--navy); display: flex; padding: 4px; }
    .icon-btn svg { width: 22px; height: 22px; }
    .lang-toggle { display: flex; align-items: center; font-size: 0.85rem; font-weight: 700; border: 1px solid var(--line); border-radius: 999px; overflow: hidden; }
    .lang-toggle button { border: none; background: none; cursor: pointer; padding: 6px 12px; color: var(--muted); font-weight: 700; font-size: 0.82rem; }
    .lang-toggle button.active { background: var(--navy); color: var(--white); }
    .hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 6px; }
    .hamburger span { width: 24px; height: 2px; background: var(--navy); border-radius: 2px; transition: 0.25s; }
    .board { background: var(--bg-soft); }
    .tabs { display: flex; gap: 8px; justify-content: center; margin-bottom: 36px; }
    .tab-btn { padding: 12px 30px; border-radius: 999px; border: 1px solid var(--line); background: var(--white); color: var(--muted); font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.2s; }
    .tab-btn.active { background: var(--navy); color: var(--white); border-color: var(--navy); }
    .tab-panel { display: none; max-width: 860px; margin: 0 auto; }
    .tab-panel.active { display: block; animation: fade 0.4s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .post-list { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .post-list li { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 20px 28px; border-bottom: 1px solid var(--line); transition: background 0.15s; }
    .post-list li:last-child { border-bottom: none; }
    .post-list li:hover { background: var(--bg-soft); }
    .post-title { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .post-title .badge { flex-shrink: 0; font-size: 0.72rem; font-weight: 700; padding: 4px 10px; border-radius: 6px; background: rgba(26, 45, 180, 0.08); color: var(--navy); }
    .post-title .txt { font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .post-date { flex-shrink: 0; color: var(--muted); font-size: 0.9rem; }
    .board-more { text-align: center; margin-top: 28px; }
    .board-more a { color: var(--navy); font-weight: 700; }
    .board-more a:hover { color: var(--gold-dark); }
    .field-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
    .field-card { background: var(--white); border: 1px solid var(--line); border-radius: var(--radius); padding: 38px 28px; text-align: center; transition: 0.25s ease; position: relative; top: 0; }
    .field-card:hover { top: -8px; box-shadow: var(--shadow); border-color: transparent; }
    .field-card .ic { width: 72px; height: 72px; margin: 0 auto 22px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 2rem; background: linear-gradient(135deg, var(--navy), var(--navy-light)); color: var(--gold); }
    .field-card h3 { font-size: 1.2rem; color: var(--navy); margin-bottom: 10px; font-weight: 800; }
    .field-card p { color: var(--muted); font-size: 0.95rem; }
    .footer { background: var(--navy-dark); color: rgba(255, 255, 255, 0.7); padding: 60px 0 30px; }
    .footer-top { display: grid; grid-template-columns: 1fr auto; gap: 40px; padding-bottom: 36px; border-bottom: 1px solid rgba(255, 255, 255, 0.12); }
    .footer .f-logo { font-size: 1.4rem; font-weight: 900; color: var(--white); margin-bottom: 16px; }
    .footer .f-logo span { color: var(--gold); }
    .footer address { font-style: normal; font-size: 0.92rem; line-height: 1.9; }
    .footer h4 { color: var(--white); font-size: 1rem; margin-bottom: 16px; }
    .footer .f-links li { margin-bottom: 10px; }
    .footer .f-links a { font-size: 0.92rem; transition: color 0.2s; }
    .footer .f-links a:hover { color: var(--gold); }
    .sns { display: flex; gap: 12px; margin-top: 6px; }
    .sns a { width: 40px; height: 40px; border-radius: 50%; background: rgba(255, 255, 255, 0.1); display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .sns a:hover { background: var(--gold); color: var(--navy-dark); }
    .sns svg { width: 20px; height: 20px; }
    .footer-bottom { padding-top: 24px; font-size: 0.85rem; color: rgba(255, 255, 255, 0.5); text-align: center; }
    .page-hero { position: relative; overflow: hidden; margin-top: 76px; background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dark) 100%); color: var(--white); text-align: center; padding: 84px 0; }
    .page-hero::before { content: "NEXT-K Initiative Forum"; position: absolute; inset: 0; display: flex; align-items: flex-end; justify-content: center; white-space: nowrap; font-weight: 900; letter-spacing: -0.02em; font-size: clamp(1.1rem, 6.2vw, 4.5rem); color: rgba(255, 255, 255, 0.05); pointer-events: none; padding: 0 16px 14px; }
    .page-hero .container { position: relative; z-index: 1; }
    .page-hero h1 { font-size: 2.6rem; font-weight: 800; letter-spacing: -0.02em; }
    .page-hero .crumb { margin-top: 12px; color: rgba(255, 255, 255, 0.7); font-size: 0.92rem; }
    .page-hero .crumb a:hover { color: var(--gold); }
    @media (max-width: 980px) {
      .field-grid { grid-template-columns: repeat(2, 1fr); }
      .footer-top { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 760px) {
      .main-nav { position: absolute; top: 76px; left: 0; right: 0; background: var(--white); border-bottom: 1px solid var(--line); max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
      .main-nav.open { max-height: 360px; }
      .main-nav ul { flex-direction: column; gap: 0; padding: 8px 24px; }
      .main-nav li { border-bottom: 1px solid var(--line); }
      .main-nav li:last-child { border-bottom: none; }
      .main-nav a { display: block; padding: 16px 0; }
      .main-nav a::after, .main-nav a.active::after { display: none; }
      .hamburger { display: flex; }
      .logo .ko { display: none; }
      .section { padding: 60px 0; }
      .footer-top { grid-template-columns: 1fr; gap: 30px; }
      .post-list li { padding: 16px 18px; }
      .post-title .badge { display: none; }
      .page-hero { padding: 56px 0; }
      .page-hero h1 { font-size: 2rem; }
    }
    @media (max-width: 480px) { .field-grid { grid-template-columns: 1fr; } }
  </style>
</head>

<body>
  <!-- ===================== 헤더 ===================== -->
  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="logo" aria-label="K-선도국가 미래포럼 홈">
        <span class="mark">NEXT-<span>K</span></span>
        <span class="ko">K-선도국가 미래포럼</span>
      </a>
      <nav class="main-nav" id="mainNav">
        <ul>
          <li><a href="about.html" data-ko="재단소개" data-en="About">재단소개</a></li>

          <button class="active" data-lang="ko">KOR</button>

  </header>

  <!-- ===================== 페이지 배너 ===================== -->
  <section class="page-hero">
    <div class="container">
      <h1 data-ko="소식" data-en="News">소식</h1>
      <p class="crumb"><a href="index.html" data-ko="홈" data-en="Home">홈</a> &rsaquo; <span data-ko="소식" data-en="News">소식</span></p>
    </div>
  </section>

  <!-- ===================== 게시판 ===================== -->
  <section class="section">
    <div class="container">
      <div class="tabs">
        <button class="tab-btn active" data-tab="notice" data-ko="공지사항" data-en="Notice">공지사항</button>
        <button class="tab-btn" data-tab="press" data-ko="보도자료" data-en="Press">보도자료</button>
      </div>

      <div class="tab-panel active" id="notice">
        <!-- 공지사항: Supabase에서 불러옴 (아래 스크립트가 채움) -->
        <ul class="post-list" id="notice-list">

        <ul class="post-list" id="press-list">
          <li><div class="post-title"><span class="txt">불러오는 중…</span></div></li>

  <!-- ===================== 푸터 ===================== -->

          <div class="f-logo">NEXT-<span>K</span></div>
          <address>

            서울특별시 서초구 동광로3길 119, 501호<br />
            이메일 admin@test
          </address>
        </div>
        <div>
          <h4 data-ko="소셜미디어" data-en="Social Media">소셜미디어</h4>
          <div class="sns">
            <a href="#" aria-label="유튜브"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M23 7.5a3 3 0 0 0-2.1-2.1C19 5 12 5 12 5s-7 0-8.9.4A3 3 0 0 0 1 7.5 31 31 0 0 0 .6 12 31 31 0 0 0 1 16.5a3 3 0 0 0 2.1 2.1C5 19 12 19 12 19s7 0 8.9-.4a3 3 0 0 0 2.1-2.1A31 31 0 0 0 23.4 12 31 31 0 0 0 23 7.5zM9.8 15.3V8.7l5.7 3.3z"/></svg></a>
            <a href="#" aria-label="인스타그램"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg></a>
            <a href="#" aria-label="페이스북"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 9h3V6h-3c-2.2 0-4 1.8-4 4v2H7v3h3v6h3v-6h3l1-3h-4v-2c0-.6.4-1 1-1z"/></svg></a>
          </div>
        </div>
      </div>
      <div class="footer-bottom">

      </div>
    </div>
  </footer>

  <script>
    (function () {
      const ham = document.getElementById("hamburger");
      const nav = document.getElementById("mainNav");
      if (!ham || !nav) return;
      ham.addEventListener("click", () => nav.classList.toggle("open"));
      nav.querySelectorAll("a").forEach((a) => a.addEventListener("click", () => nav.classList.remove("open")));
    })();
    (function () {
      const btns = document.querySelectorAll(".lang-toggle button");
      if (!btns.length) return;
      btns.forEach((btn) => {
        btn.addEventListener("click", () => {
          const lang = btn.dataset.lang;
          btns.forEach((b) => b.classList.toggle("active", b === btn));
          document.documentElement.lang = lang;
          document.querySelectorAll("[data-ko]").forEach((el) => {
            const val = el.getAttribute("data-" + lang);
            if (val !== null) el.innerHTML = val.replace(/\n/g, "<br />");
          });
        });
      });
    })();
    (function () {
      const tabBtns = document.querySelectorAll(".tab-btn");
      if (!tabBtns.length) return;
      tabBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".tab-btn").forEach((b) => b.classList.remove("active"));
          document.querySelectorAll(".tab-panel").forEach((p) => p.classList.remove("active"));
          btn.classList.add("active");
          const panel = document.getElementById(btn.dataset.tab);
          if (panel) panel.classList.add("active");
        });
      });
    })();
  </script>

  <!-- ===== Supabase 게시판 연동 (공지사항 + 보도자료) ===== -->
  <script>
    (function () {
      // 공개(publishable) 키 — 브라우저에 노출돼도 안전합니다. (RLS가 쓰기를 막아줌)
      const SUPABASE_URL = "https://vemjnkustbmhlnilrfek.supabase.co";
      const SUPABASE_KEY = "sb_publishable_eibRqfTfb-3M4ZCmqatQlg_FN6dsM7T";

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, function (c) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
        });
      }
      function fmtDate(iso) {
        const d = new Date(iso);
        const p = (n) => String(n).padStart(2, "0");
        return d.getFullYear() + "." + p(d.getMonth() + 1) + "." + p(d.getDate());
      }

      // category(notice/press)별로 노출된 글을 불러와 해당 목록(elId)에 그립니다.
      async function loadBoard(elId, category, badge, limit) {
        const list = document.getElementById(elId);
        if (!list) return;
        try {
          let url =
            SUPABASE_URL +
            "/rest/v1/notices?select=id,title,created_at&published=eq.true&category=eq." +
            category +
            "&order=created_at.desc";
          if (limit) url += "&limit=" + limit;
          const res = await fetch(url, {
            headers: { apikey: SUPABASE_KEY, Authorization: "Bearer " + SUPABASE_KEY },
          });
          if (!res.ok) throw new Error("HTTP " + res.status);
          const rows = await res.json();

          if (!rows.length) {
            list.innerHTML =
              '<li><div class="post-title"><span class="txt">등록된 글이 없습니다.</span></div></li>';
            return;
          }
          list.innerHTML = rows
            .map(function (n) {
              return (
                '<li><a href="post.html?id=' +
                encodeURIComponent(n.id) +
                '" style="display:flex;align-items:center;justify-content:space-between;gap:16px;width:100%;color:inherit;">' +
                '<div class="post-title"><span class="badge">' +
                badge +
                '</span><span class="txt">' +
                escapeHtml(n.title) +
                '</span></div><span class="post-date">' +
                fmtDate(n.created_at) +
                "</span></a></li>"
              );
            })
            .join("");
        } catch (e) {
          list.innerHTML =
            '<li><div class="post-title"><span class="txt">불러오지 못했습니다.</span></div></li>';
        }
      }

      loadBoard("notice-list", "notice", "공지"); // 공지사항 전체
      loadBoard("press-list", "press", "보도"); // 보도자료 전체
    })();
  </script>
